
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Receipt Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; text-align: center; }
    h2 { font-size: 1.1rem; margin: 16px 0 12px; }
    .upload-area { background: white; border: 2px dashed #c0c0c0; border-radius: 12px; padding: 32px 16px; text-align: center; margin-bottom: 16px; cursor: pointer; }
    .upload-area label { font-size: 1rem; color: #555; cursor: pointer; display: block; }
    #fileInput { display: none; }
    #preview { width: 100%; border-radius: 12px; margin-bottom: 16px; display: none; }
    button { width: 100%; padding: 14px; background: #1a1a2e; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-bottom: 16px; display: none; }
    #status { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 16px; min-height: 20px; }
    .item-card { background: white; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .item-name { font-weight: 500; }
    .item-meta { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .item-price { font-weight: 600; color: #1a1a2e; }
    hr { border: none; border-top: 1px solid #ddd; margin: 24px 0; }
    .delete-btn { background: none; border: none; color: #ccc; font-size: 1.2rem; cursor: pointer; padding: 0 0 0 8px; display: inline; width: auto; margin: 0; }
    .delete-btn:hover { color: #e00; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧾 Receipt Scanner</h1>

    <div class="upload-area">
      <label for="fileInput">📷 Tap to photograph or upload a receipt</label>
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <img id="preview" alt="Receipt preview" />
    <button id="scanBtn">Scan Receipt</button>
    <div id="status"></div>
    <div id="results"></div>

    <hr />
    <h2>Recent Scans</h2>
    <div id="history"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
